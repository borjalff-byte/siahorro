name: Generar artículo de blog

on:
  schedule:
    - cron: '0 9 1 * *'  # El día 1 de cada mes a las 9:00 UTC
  workflow_dispatch:      # También se puede lanzar manualmente desde GitHub

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Generar artículo con Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generar-articulo.js

      - name: Commit y push del nuevo artículo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git diff --cached --quiet || git commit -m "blog: artículo automático $(date +'%Y-%m')"
          git push
